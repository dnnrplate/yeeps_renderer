<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeeps Cosmetic Loadout Sandbox</title>
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            height: 100vh; 
            background: #0f0f12; 
            color: #f3f4f6; 
            overflow: hidden;
        }
        #sidebar { 
            width: 320px; 
            background: #18181c; 
            padding: 24px; 
            overflow-y: auto; 
            border-right: 1px solid #2e2e38;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        h3 { 
            margin-top: 0; 
            color: #c084fc; 
            border-bottom: 2px solid #2e2e38; 
            padding-bottom: 12px; 
            text-transform: uppercase; 
            font-size: 18px; 
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }
        #controls-list { flex: 1; }
        .category-block { 
            margin-bottom: 20px; 
            background: #202026; 
            border-radius: 8px; 
            padding: 14px; 
            border: 1px solid #2e2e38; 
        }
        .category-title { 
            margin: 0 0 12px 0; 
            color: #e9d5ff; 
            font-size: 13px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #3b3b4f; 
            padding-bottom: 6px; 
            font-weight: 700; 
        }
        .toggle-item { 
            display: flex; 
            align-items: center; 
            margin: 10px 0; 
            font-size: 14px; 
            cursor: pointer; 
            color: #d1d5db; 
            text-transform: capitalize;
            transition: color 0.2s ease, transform 0.1s ease;
        }
        .toggle-item:hover { 
            color: #ffffff; 
            transform: translateX(2px);
        }
        .toggle-item input { 
            margin-right: 12px; 
            accent-color: #a855f7; 
            cursor: pointer; 
            width: 16px;
            height: 16px;
        }
        #viewer-container { 
            flex: 1; 
            position: relative; 
            background: radial-gradient(circle at center, #1e1e24 0%, #09090b 100%);
        }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        .status-msg { font-size: 14px; color: #9ca3af; font-style: italic; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Yeeps Wardrobe</h3>
        <div id="controls-list">
            <div class="status-msg">Analyzing compressed asset maps...</div>
        </div>
    </div>

    <div id="viewer-container">
        <model-viewer 
            id="yeepSandbox" 
            src="virtually_milo_yeep_1.glb" 
            camera-controls 
            shadow-intensity="1.5" 
            exposure="1.2"
            environment-image="neutral"
            interaction-prompt="none">
        </model-viewer>
    </div>

    <script>
        const modelViewer = document.querySelector('#yeepSandbox');
        const controlsList = document.querySelector('#controls-list');

        modelViewer.addEventListener('load', () => {
            controlsList.innerHTML = ''; 
            
            const scene = modelViewer.model ? modelViewer.model.coreObject : null;
            if (!scene) {
                controlsList.innerHTML = '<div class="status-msg" style="color:#f87171;">Fatal: Couldn\'t load structural core of your GLB file.</div>';
                return;
            }

            let discoveredItemsCount = 0;

            scene.traverse((node) => {
                if (node.isMesh || node.type === "Object3D" || node.type === "SkinnedMesh") {
                    const nameLower = node.name.toLowerCase();
                    
                    if (
                        nameLower.includes("armature") || 
                        nameLower.includes("root") || 
                        nameLower.includes("bone") || 
                        nameLower.includes("rig") ||
                        node.name === "Scene"
                    ) {
                        return;
                    }

                    if (nameLower.includes("body") && !nameLower.includes("shirt") && !nameLower.includes("cosmetic")) {
                        node.visible = true; 
                        return; 
                    }

                    node.visible = false;
                    discoveredItemsCount++;

                    let targetCategory = "Other Accessories";
                    if (nameLower.includes("hair")) targetCategory = "Hair Styles";
                    else if (nameLower.includes("hat") || nameLower.includes("helm") || nameLower.includes("cap")) targetCategory = "Hats & Helmets";
                    else if (nameLower.includes("shirt") || nameLower.includes("torso") || nameLower.includes("jacket") || nameLower.includes("coat")) targetCategory = "Shirts & Tops";
                    else if (nameLower.includes("over")) targetCategory = "Over-Layers";
                    else if (nameLower.includes("zipper")) targetCategory = "Zippers";
                    else if (nameLower.includes("badge") || nameLower.includes("pin")) targetCategory = "Badges & Pins";

                    const safeBlockId = `block-${targetCategory.replace(/\s+/g, '')}`;
                    let categoryBlock = document.getElementById(safeBlockId);
                    
                    if (!categoryBlock) {
                        categoryBlock = document.createElement('div');
                        categoryBlock.id = safeBlockId;
                        categoryBlock.className = 'category-block';
                        
                        const blockTitle = document.createElement('h4');
                        blockTitle.className = 'category-title';
                        blockTitle.textContent = targetCategory;
                        
                        categoryBlock.appendChild(blockTitle);
                        controlsList.appendChild(categoryBlock);
                    }

                    let cleanPresentationName = node.name
                        .replace(/cosmetic_/gi, '')
                        .replace(/layer/gi, '')
                        .replace(/_/g, ' ')
                        .trim();

                    if (!cleanPresentationName) {
                        cleanPresentationName = `Cosmetic Gear #${discoveredItemsCount}`;
                    }

                    const itemWrapper = document.createElement('div');
                    itemWrapper.className = 'toggle-item';
                    
                    const itemCheckbox = document.createElement('input');
                    itemCheckbox.type = 'checkbox';
                    itemCheckbox.id = `checkbox-node-${node.id || Math.random().toString(36).substr(2, 9)}`;
                    
                    const itemLabel = document.createElement('label');
                    itemLabel.htmlFor = itemCheckbox.id;
                    itemLabel.textContent = cleanPresentationName;

                    itemCheckbox.addEventListener('change', (event) => {
                        node.visible = event.target.checked;
                        if (node.children && node.children.length > 0) {
                            node.traverse((childNode) => {
                                childNode.visible = event.target.checked;
                            });
                        }
                        modelViewer.queueRender();
                    });

                    itemWrapper.appendChild(itemCheckbox);
                    itemWrapper.appendChild(itemLabel);
                    categoryBlock.appendChild(itemWrapper);
                }
            });

            if (discoveredItemsCount === 0) {
                controlsList.innerHTML = '<div class="status-msg" style="color:#f59e0b;">Warning: 3D data parsed successfully, but zero toggleable items were found.</div>';
            }
        });
    </script>
</body>
</html>
